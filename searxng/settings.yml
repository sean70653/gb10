use_default_settings: true

server:
  secret_key: "change-me-to-another-random-string"
  port: 8080
  bind_address: "0.0.0.0"
  image_proxy: true

search:
  safe_search: 0
  autocomplete: "google"
  default_lang: "all"
  formats:
    - html
    - json

ui:
  static_use_hash: true

engines:
  - name: google
    engine: google
    shortcut: g
  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg
  - name: bing
    engine: bing
    shortcut: b
  - name: wikipedia
    engine: wikipedia
    shortcut: wp
  - name: github
    engine: github
    shortcut: gh
