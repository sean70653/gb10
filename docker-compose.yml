services:
  # ── vLLM inference server ───────────────────────────────────
  vllm:
    image: ${VLLM_IMAGE:-nvcr.io/nvidia/vllm:26.05-py3}
    container_name: vllm
    restart: unless-stopped
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    ulimits:
      memlock: -1
      stack: 67108864
    ports:
      - "${VLLM_PORT:-8000}:8000"
    volumes:
      - ${MODEL_DIR:-/data/models/Qwen--Qwen3.6-35B-A3B-FP8}:/model:ro
    command:
      - python
      - -m
      - vllm.entrypoints.openai.api_server
      - --model
      - /model
      - --served-model-name
      - ${SERVED_MODEL_NAME:-Qwen/Qwen3.6-35B-A3B-FP8}
      - --host
      - "0.0.0.0"
      - --port
      - "8000"
      - --gpu-memory-utilization
      - "${GPU_MEMORY_UTILIZATION:-0.75}"
      - --max-model-len
      - "${MAX_MODEL_LEN:-262144}"
      - --reasoning-parser
      - ${REASONING_PARSER:-qwen3}
      - --enable-auto-tool-choice
      - --tool-call-parser
      - ${TOOL_CALL_PARSER:-qwen3_coder}
      - --speculative-config
      - '{"method":"qwen3_next_mtp","num_speculative_tokens":2}'
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 60
      start_period: 300s

  # ── SearXNG meta-search engine ──────────────────────────────
  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    restart: unless-stopped
    ports:
      - "${SEARXNG_PORT:-8080}:8080"
    volumes:
      - ./searxng:/etc/searxng:rw
    environment:
      - SEARXNG_BASE_URL=http://localhost:${SEARXNG_PORT:-8080}/
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - DAC_OVERRIDE
    logging:
      driver: json-file
      options:
        max-size: 1m
        max-file: "1"

  # ── Open WebUI ──────────────────────────────────────────────
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    ports:
      - "${OPEN_WEBUI_PORT:-3000}:8080"
    volumes:
      - open-webui-data:/app/backend/data
    environment:
      - OPENAI_API_BASE_URL=http://vllm:8000/v1
      - ENABLE_WEB_SEARCH=True
      - WEB_SEARCH_ENGINE=searxng
      - WEB_SEARCH_RESULT_COUNT=5
      - WEB_SEARCH_CONCURRENT_REQUESTS=10
      - SEARXNG_QUERY_URL=http://searxng:8080/search?q=<query>
      - ENABLE_CODE_INTERPRETER=true
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY:-change-me}
      - OPENAI_API_KEY=${VLLM_API_KEY:-not-needed}
      - DEFAULT_LOCALE=${DEFAULT_LOCALE:-}
      - DEFAULT_MODEL_PARAMS={"function_calling":"native"}
      - DEFAULT_MODEL_METADATA={"capabilities":{"web_search":true,"citations":true},"features":{"web_search":true},"defaultFeatureIds":["web_search"]}
    depends_on:
      vllm:
        condition: service_healthy
      searxng:
        condition: service_started

volumes:
  open-webui-data:
